<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Office API - Documentation</title>
    <link rel="icon" href="../assets/images/logo.png">
    <script type="module" src="https://cdn.jsdelivr.net/npm/rapidoc@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; }
        rapi-doc {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <rapi-doc
        spec-url="openapi.json"
        render-style="read"
        theme="dark"
        layout="row"
        primary-color="#2563eb"
        show-header="true"
        show-info="true"
        allow-authentication="true"
        allow-try="true"
        schema-description-expanded="true"
        default-schema-tab="schema"
        response-area-height="350"
        heading-text="SOMS - Smart Office API"
        nav-bg-color="#0f172a"
        nav-hover-bg-color="#1e293b"
        nav-accent-color="#2563eb"
        bg-color="#0f172a"
        font-size="default">
    </rapi-doc>
</body>
</html>
